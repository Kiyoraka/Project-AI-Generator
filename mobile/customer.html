<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <title>Studio — AIGen</title>

    <script src="../assets/js/device-route.js"></script>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/mobile-base.css" />
    <link rel="stylesheet" href="../assets/css/mobile-shell.css" />
    <link rel="stylesheet" href="../assets/css/mobile-customer.css" />
</head>
<body class="m-customer-body has-topbar has-tabbar">

    <!-- Top bar -->
    <header class="m-topbar">
        <a href="../index.html" class="m-topbar-brand">
            <span class="brand-mark" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <defs>
                        <linearGradient id="m-cust-grad" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#8B5CF6"/>
                            <stop offset="100%" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                    <path d="M14 2 L26 9 L26 19 L14 26 L2 19 L2 9 Z" fill="url(#m-cust-grad)" />
                    <path d="M14 8 L20 11.5 L20 16.5 L14 20 L8 16.5 L8 11.5 Z" fill="#0A0A0F" />
                </svg>
            </span>
            <span class="brand-name">AIGen</span>
        </a>
        <div class="m-topbar-actions">
            <span class="m-credit-chip" aria-label="Credits">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2 4.5 5 .5-3.5 3.5L12.5 15 8 12.5 3.5 15l1-5.5L1 6l5-.5L8 1z"/></svg>
                <strong id="credit-amount">240</strong>
            </span>
            <span class="m-avatar" id="user-avatar" style="width: 32px; height: 32px; font-size: 12px;">AC</span>
        </div>
    </header>

    <!-- Page title row -->
    <div class="m-page-title-row">
        <h1 class="m-page-title" id="page-title">Home</h1>
        <p class="m-page-sub" id="page-sub">Welcome back, Alice</p>
    </div>

    <!-- Panels -->
    <main class="m-customer-panels m-container">

        <!-- Home panel -->
        <section class="panel" data-panel="home">
            <div class="m-shortcut-row">
                <button type="button" class="m-shortcut-card" data-quick="video">
                    <span class="m-shortcut-icon" data-tone="violet">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l14 8-14 8V4z"/></svg>
                    </span>
                    <span class="m-shortcut-label">Quick Video</span>
                </button>
                <button type="button" class="m-shortcut-card" data-quick="image">
                    <span class="m-shortcut-icon" data-tone="cyan">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="9" r="2" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2"/></svg>
                    </span>
                    <span class="m-shortcut-label">Quick Image</span>
                </button>
            </div>

            <article class="m-continue-card">
                <div class="m-continue-thumb" id="continue-thumb"></div>
                <div class="m-continue-meta">
                    <p class="m-continue-eyebrow">Continue creating</p>
                    <p class="m-continue-title">Neon city · 0:08</p>
                    <button type="button" class="btn btn-primary btn-sm">Resume →</button>
                </div>
            </article>

            <h2 class="m-subsection-title" style="margin: var(--space-5) 0 var(--space-3);">Recent</h2>
            <div class="m-output-grid" id="home-recent">
                <!-- Populated by mobile-customer.js -->
            </div>
        </section>

        <!-- Inspire panel -->
        <section class="panel" data-panel="inspire" hidden>
            <div class="m-output-grid" id="inspire-grid"></div>
        </section>

        <!-- Library panel -->
        <section class="panel" data-panel="library" hidden>
            <div class="m-filter-row scroll-x">
                <span class="pill pill-violet is-active" data-lib-filter="all">All</span>
                <span class="pill" data-lib-filter="video">Videos</span>
                <span class="pill" data-lib-filter="image">Images</span>
            </div>
            <div class="m-output-grid" id="library-grid"></div>
        </section>

        <!-- Me panel -->
        <section class="panel" data-panel="me" hidden>
            <div class="m-me-head">
                <span class="m-avatar" id="me-avatar">AC</span>
                <div>
                    <p class="m-me-name" id="me-name">Alice Chen</p>
                    <p class="m-me-email" id="me-email">customer@gmail.com</p>
                </div>
            </div>

            <article class="m-plan-card">
                <div class="m-plan-head">
                    <div>
                        <p class="m-plan-label">Current plan</p>
                        <h3 class="m-plan-name gradient-text">Pro</h3>
                    </div>
                    <span class="pill pill-violet">Active</span>
                </div>
                <div class="m-plan-stat">
                    <p class="m-plan-stat-label">Credits used</p>
                    <p class="m-plan-stat-value">260 <span class="m-plan-stat-meta">of 500</span></p>
                    <div class="m-plan-stat-bar"><div class="m-plan-stat-fill" style="width: 52%;"></div></div>
                </div>
                <button type="button" class="btn btn-primary btn-block">Upgrade to Studio</button>
            </article>

            <div class="m-list">
                <button type="button" class="m-list-row">
                    <svg class="m-list-row-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="8" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M4 17a6 6 0 0112 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                    <span class="m-list-row-label">Profile</span>
                    <span class="m-list-row-chevron">›</span>
                </button>
                <button type="button" class="m-list-row">
                    <svg class="m-list-row-icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="6" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M3 10h14" stroke="currentColor" stroke-width="1.6"/></svg>
                    <span class="m-list-row-label">Billing</span>
                    <span class="m-list-row-value">Visa 4242</span>
                    <span class="m-list-row-chevron">›</span>
                </button>
                <button type="button" class="m-list-row">
                    <svg class="m-list-row-icon" viewBox="0 0 20 20" fill="none"><path d="M10 3a5 5 0 015 5v4l1 2H4l1-2V8a5 5 0 015-5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="m-list-row-label">Notifications</span>
                    <span class="m-list-row-chevron">›</span>
                </button>
            </div>

            <button type="button" class="m-switch-view" onclick="window.AIGenView.switchToDesktop()" style="margin-top: var(--space-4);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M9 21h6M12 17v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                <span>View desktop site</span>
                <span class="m-switch-view-arrow">→</span>
            </button>

            <button type="button" class="btn btn-ghost btn-block btn-lg m-logout-btn" id="logout-btn" style="margin-top: var(--space-4);">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
                    <path d="M6 2H3v12h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Sign out
            </button>
        </section>

    </main>

    <!-- Bottom tab bar (5 tabs - customer with center Create FAB) -->
    <nav class="m-tabbar tabbar-5" aria-label="Customer navigation">
        <button type="button" class="m-tab is-active" data-target="home">
            <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none"><path d="M3 12l9-9 9 9M5 10v10h14V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Home</span>
        </button>
        <button type="button" class="m-tab" data-target="inspire">
            <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.5 6.5L21 10l-5 4.5 1.5 7L12 18l-5.5 3.5L8 14.5 3 10l6.5-1.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            <span>Inspire</span>
        </button>
        <button type="button" class="m-tab m-tab-fab" id="create-fab" aria-label="Create">
            <span class="fab">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
            </span>
            <span class="m-tab-fab-label">Create</span>
        </button>
        <button type="button" class="m-tab" data-target="library">
            <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none"><path d="M4 4h16v16H4zM4 9h16M9 4v16" stroke="currentColor" stroke-width="1.8"/></svg>
            <span>Library</span>
        </button>
        <button type="button" class="m-tab" data-target="me">
            <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21a8 8 0 0116 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Me</span>
        </button>
    </nav>

    <!-- Create sheet modal -->
    <div class="m-sheet-backdrop" id="create-backdrop"></div>
    <div class="m-sheet" id="create-sheet" role="dialog" aria-modal="true" aria-labelledby="create-sheet-title">
        <div class="m-sheet-handle"></div>

        <header class="m-sheet-head">
            <h2 class="m-sheet-title" id="create-sheet-title">Create</h2>
            <button type="button" class="m-sheet-close" id="create-close" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5l-10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </header>

        <div class="m-sheet-body">
            <div class="m-type-segment">
                <button type="button" class="m-type-btn is-active" data-type="video">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4l14 8-14 8V4z"/></svg>
                    Video
                </button>
                <button type="button" class="m-type-btn" data-type="image">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/><circle cx="9" cy="9" r="2" fill="currentColor"/></svg>
                    Image
                </button>
            </div>

            <div class="field">
                <label for="create-prompt">Prompt</label>
                <textarea id="create-prompt" rows="3" placeholder="A neon city street at night, cinematic 4K, slow dolly forward...">A neon city street at night, cinematic 4K, slow dolly forward.</textarea>
            </div>

            <div class="m-grid-2">
                <div class="field">
                    <label for="create-style">Style</label>
                    <select id="create-style">
                        <option>Cinematic</option>
                        <option>Anime</option>
                        <option>Photoreal</option>
                        <option>Watercolor</option>
                    </select>
                </div>
                <div class="field" id="create-duration-field">
                    <label for="create-duration">Duration</label>
                    <select id="create-duration">
                        <option value="3">3 seconds</option>
                        <option value="5" selected>5 seconds</option>
                        <option value="8">8 seconds</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="m-sheet-foot">
            <p class="m-create-cost">Cost: <strong>10 credits</strong></p>
            <button type="submit" id="create-submit" class="btn btn-primary btn-lg btn-block">
                <span class="create-submit-label">Generate video</span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/mobile-customer.js"></script>
</body>
</html>
