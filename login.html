<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to AIGen" />
    <title>Sign in — AIGen</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body class="auth-body">

    <div class="auth-orb auth-orb-1" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-2" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-3" aria-hidden="true"></div>

    <a href="index.html" class="auth-back" aria-label="Back to home">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
    </a>

    <main class="auth-main">
        <section class="auth-card glass-strong" aria-labelledby="auth-heading">

            <a href="index.html" class="brand auth-brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
                        <defs>
                            <linearGradient id="auth-brand-grad" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#8B5CF6"/>
                                <stop offset="100%" stop-color="#EC4899"/>
                            </linearGradient>
                        </defs>
                        <path d="M14 2 L26 9 L26 19 L14 26 L2 19 L2 9 Z" fill="url(#auth-brand-grad)" />
                        <path d="M14 8 L20 11.5 L20 16.5 L14 20 L8 16.5 L8 11.5 Z" fill="#0A0A0F" />
                    </svg>
                </span>
                <span class="brand-name">AIGen</span>
            </a>

            <header class="auth-head">
                <h1 id="auth-heading" class="auth-title">Welcome back</h1>
                <p class="auth-sub">Sign in to continue generating.</p>
            </header>

            <form class="auth-form" id="login-form" novalidate>
                <div class="field">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        autocomplete="email"
                        required
                        placeholder="you@example.com"
                    />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                        placeholder="Enter your password"
                    />
                </div>

                <p class="auth-error" id="auth-error" role="alert" hidden></p>

                <button type="submit" class="btn btn-primary btn-lg auth-submit">
                    <span class="auth-submit-label">Sign in</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <footer class="auth-foot">
                <p class="auth-hint">
                    <span class="auth-hint-label">Demo accounts</span>
                </p>
                <ul class="auth-demo-list">
                    <li>
                        <button type="button" class="auth-demo" data-fill="admin">
                            <strong>admin@gmail.com</strong>
                            <span>Admin Dashboard</span>
                        </button>
                    </li>
                    <li>
                        <button type="button" class="auth-demo" data-fill="customer">
                            <strong>customer@gmail.com</strong>
                            <span>Customer Dashboard</span>
                        </button>
                    </li>
                </ul>
                <p class="auth-foot-note">Both accounts use password <code>admin123</code></p>
            </footer>
        </section>
    </main>

    <script src="assets/js/auth.js"></script>
</body>
</html>
